# Secret scan — CI layer.
#
# Why this exists alongside the pre-commit hook: the hook is bypassable
# (`git commit --no-verify`) and simply absent on any machine where it was never
# installed. Measured 2026-07-19: the hook was installed in 0 of 51 local repos.
# CI is the gate that cannot be skipped.
#
# 🔴 fetch-depth: 0 is the load-bearing line. The default shallow checkout gives CI
# only the tip commit, so `--all` (git ls-files) would scan the current checkout and
# never look at history — exactly the blind spot the hook already has. A credential
# committed last month and "removed" in a later commit still sits in history and is
# still valid until rotated.
#
# Install: copy to .github/workflows/secret-scan.yml in the target repo.
# The scanner is vendored via checkout of the skills repo so every repo runs the
# same rules rather than drifting copies.

name: Secret scan

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # 🔴 do not remove — see header

      - name: Fetch scanner + rules
        uses: actions/checkout@v4
        with:
          repository: noique/cross-border-ecommerce-skills
          path: .secret-scanner
          fetch-depth: 1

      - name: Rule selftest
        # Runs FIRST and gates the rest: a rule that scans nothing makes every scan below
        # pass for the wrong reason. Catches both invalid regexes and the silent class
        # (valid pattern that matches nothing, e.g. `\|` read as a literal pipe).
        run: |
          bash .secret-scanner/tools/security-precommit-check/scripts/selftest.sh

      - name: Scan tracked files
        run: |
          bash .secret-scanner/tools/security-precommit-check/scripts/scan.sh --all

      - name: Scan full history
        # Blobs reachable from any commit, not just the current tree. Runs even if the
        # tracked-file scan passed, because those are genuinely different questions.
        run: |
          set -o pipefail
          RULES=.secret-scanner/tools/security-precommit-check/rules/default.txt
          PATS=$(mktemp)
          # SEV|PATTERN|DESC — PATTERN may itself contain '|', so take first field as
          # severity, last as description, and rejoin everything between.
          while IFS= read -r line || [ -n "$line" ]; do
            case "$line" in ''|\#*) continue ;; esac
            case "$line" in *"|"*) ;; *) continue ;; esac
            sev="${line%%|*}"; rest="${line#*|}"; dsc="${rest##*|}"
            if [ "$rest" = "$dsc" ]; then pat="$rest"; else pat="${rest%|*}"; fi
            [ "$sev" = "BLOCK" ] || continue
            # drop invalid regexes loudly — one bad pattern must not blank the scan
            err=$(printf 'probe' | grep -E -e "$pat" 2>&1 >/dev/null) || true
            if [ -n "$err" ]; then echo "::warning::dropping invalid rule regex: $pat"; continue; fi
            printf '%s\n' "$pat" >> "$PATS"
          done < "$RULES"

          hits=0
          while IFS= read -r obj; do
            if git cat-file -p "$obj" 2>/dev/null | grep -nHE -f "$PATS" >/dev/null 2>&1; then
              echo "::error::secret pattern found in historical blob $obj"
              git cat-file -p "$obj" 2>/dev/null | grep -nE -f "$PATS" | head -3 | cut -c1-160
              hits=$((hits+1))
            fi
          done < <(git rev-list --objects --all | awk '{print $1}' | \
                   git cat-file --batch-check='%(objectname) %(objecttype) %(objectsize)' | \
                   awk '$2=="blob" && $3<1048576 {print $1}')

          if [ "$hits" -gt 0 ]; then
            echo "Found $hits historical blob(s) containing credential patterns."
            echo "🔴 Rotate the credential at the provider FIRST. Cleaning history does not"
            echo "   un-leak it — the key is already out and stays valid until rotated."
            exit 1
          fi
          echo "No credential patterns in history."
