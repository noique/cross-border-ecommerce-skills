# Secret scan — CI layer.
#
# Why this exists alongside the pre-commit hook: the hook is bypassable
# (`git commit --no-verify`) and simply absent on any machine where it was never
# installed. Measured 2026-07-19: the hook was installed in 0 of 51 local repos.
# CI is the gate that cannot be skipped.
#
# 🔴 fetch-depth: 0 is the load-bearing line. The default shallow checkout gives CI
# only the tip commit, so `--all` (git ls-files) would scan the current checkout and
# never look at history — exactly the blind spot the hook already has. A credential
# committed last month and "removed" in a later commit still sits in history and is
# still valid until rotated.
#
# Install: copy to .github/workflows/secret-scan.yml in the target repo.
# The scanner is vendored via checkout of the skills repo so every repo runs the
# same rules rather than drifting copies.

name: Secret scan

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # 🔴 do not remove — see header

      - name: Fetch scanner + rules
        uses: actions/checkout@v4
        with:
          repository: noique/cross-border-ecommerce-skills
          path: .secret-scanner
          fetch-depth: 1

      - name: Rule selftest
        # Runs FIRST and gates the rest: a rule that scans nothing makes every scan below
        # pass for the wrong reason. Catches both invalid regexes and the silent class
        # (valid pattern that matches nothing, e.g. `\|` read as a literal pipe).
        run: |
          bash .secret-scanner/tools/security-precommit-check/scripts/selftest.sh

      - name: Scan tracked files
        run: |
          bash .secret-scanner/tools/security-precommit-check/scripts/scan.sh --all

      - name: Scan full history
        # Blobs reachable from any commit, not just the current tree — a genuinely
        # different question from the step above, so it runs even when that one passed.
        # The logic lives in scan-history.sh, NOT inline here: as 60 lines of bash inside
        # a `run:` block it could only be tested by pushing and watching CI, and it
        # shipped with two bugs that a single local run would have caught (it flagged the
        # scanner's OWN credential-shaped test fixtures on every run, and it discarded the
        # blob paths that make a hit actionable).
        run: |
          bash .secret-scanner/tools/security-precommit-check/scripts/scan-history.sh
